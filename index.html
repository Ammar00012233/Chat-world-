<script>
  const supabase = supabase.createClient(
    "https://xrycbvmjskyagnqdrvrt.supabase.co",
    "sb_publishable_V-cqr_rpr8N5nE-MDUrXZQ_PrAhveCY"   // تأكد إنه anon key صحيح
  );

  const msgInput = document.getElementById('msgInput');
  const messagesDiv = document.getElementById('messages');
  const sendBtn = document.getElementById('sendBtn');

  let userId = localStorage.getItem('chatUserId');
  if (!userId) {
    userId = 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('chatUserId', userId);
  }

  function escapeHtml(text) {
    return text.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]);
  }

  async function loadMessages(silent = false) {
    try {
      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .order('created_at', { ascending: false })  // الأحدث أولاً
        .limit(60);

      if (error) throw error;

      messagesDiv.innerHTML = (data || []).reverse().map(m => {   // عكس الترتيب ليظهر الأحدث أسفل
        const isMe = m.user_id === userId;
        const time = new Date(m.created_at).toLocaleTimeString('ar-EG', {hour:'numeric', minute:'2-digit'});
        return `
          <div class="msg ${isMe ? 'user' : 'other'}">
            <small>${isMe ? 'أنت' : 'مستخدم'} • ${time}</small>
            ${escapeHtml(m.content)}
          </div>
        `;
      }).join('');

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    } catch (err) {
      console.error('loadMessages error:', err);
      if (!silent) alert('مشكلة في جلب الرسائل\n' + err.message);
    }
  }

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    try {
      const { error } = await supabase
        .from('messages')
        .insert([{ content: text, user_id: userId }]);

      if (error) throw error;

      msgInput.value = '';
      await loadMessages(true);   // تحديث فوري + صامت (بدون alert)
    } catch (err) {
      console.error('send error:', err);
      alert('فشل الإرسال: ' + (err.message || 'تحقق من الإنترنت أو إعدادات Supabase'));
    }
  }

  // ─── الأحداث ───
  sendBtn.onclick = sendMessage;
  msgInput.onkeypress = e => { if (e.key === 'Enter') sendMessage(); };

  // تحميل أول مرة + تحديث كل 4 ثواني كخطة احتياطية
  loadMessages();
  setInterval(() => loadMessages(true), 4000);
</script>
