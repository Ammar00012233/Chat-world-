<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>World Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f2f2f2; }
    #messages { height: 400px; overflow-y: auto; border:1px solid #ccc; padding:10px; margin-bottom:10px; background:white; }
    input { width: 80%; padding:5px; }
    button { padding:5px 10px; }
    p { margin:3px 0; word-wrap: break-word; }
  </style>
</head>
<body>

<h2>World Chat</h2>

<div id="messages"></div>

<input id="msg" placeholder="Type your message..." maxlength="200" />
<button id="sendBtn">Send</button>

<script>
  // Supabase keys
  const supabase = supabase.createClient(
    "https://xrycbvmjskyagnqdrvrt.supabase.co",
    "sb_publishable_V-cqr_rpr8N5nE-MDUrXZQ_PrAhveCY"
  );

  const msgInput = document.getElementById('msg');
  const sendBtn = document.getElementById('sendBtn');
  const messagesDiv = document.getElementById('messages');

  // Load messages
  async function loadMessages() {
    const { data } = await supabase
      .from('messages')
      .select('*')
      .order('created_at', { ascending: true });
    messagesDiv.innerHTML = data.map(m => `<p>${m.content}</p>`).join('');
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // Send message
  sendBtn.addEventListener('click', async () => {
    const text = msgInput.value.trim();
    if (!text || text.includes('http')) return;

    try {
      await supabase.from('messages').insert([{ content: text }]);
      msgInput.value = '';
      loadMessages();
    } catch (err) {
      console.error("Insert failed:", err);
    }
  });

  // Auto refresh messages every 2 seconds
  setInterval(loadMessages, 2000);
  loadMessages();
</script>

</body>
</html>
