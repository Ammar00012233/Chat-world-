<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>World Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; margin:0; padding:0; background:#f2f2f2; }
    .chat-container { max-width: 500px; margin: 20px auto; background:white; border-radius:10px; box-shadow:0 0 5px rgba(0,0,0,0.2); display:flex; flex-direction:column; height:80vh; }
    #messages { flex:1; overflow-y:auto; padding:10px; }
    .msg { padding:5px 10px; margin:5px 0; border-radius:10px; max-width:80%; word-wrap:break-word; }
    .msg.user { background:#DCF8C6; align-self:flex-end; }
    .msg.other { background:#EEE; align-self:flex-start; }
    .input-container { display:flex; padding:10px; border-top:1px solid #ccc; }
    #msgInput { flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; }
  </style>
</head>
<body>

<div class="chat-container">
  <div id="messages"></div>
  <div class="input-container">
    <input id="msgInput" placeholder="Type a message..." maxlength="200" />
  </div>
</div>

<script>
  // Supabase keys
  const supabase = supabase.createClient(
    "https://xrycbvmjskyagnqdrvrt.supabase.co",
    "sb_publishable_V-cqr_rpr8N5nE-MDUrXZQ_PrAhveCY"
  );

  const msgInput = document.getElementById('msgInput');
  const messagesDiv = document.getElementById('messages');

  // Generate random user id for demo
  const userId = Math.floor(Math.random()*1000000);

  // Load messages
  async function loadMessages() {
    const { data } = await supabase
      .from('messages')
      .select('*')
      .order('created_at', { ascending: true });

    messagesDiv.innerHTML = data.map(m => {
      const cls = m.user_id === userId ? 'user' : 'other';
      return `<div class="msg ${cls}">${m.content}</div>`;
    }).join('');
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // Send message on Enter
  msgInput.addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
      const text = msgInput.value.trim();
      if(!text || text.includes('http')) return;
      await supabase.from('messages').insert([{ content:text, user_id:userId }]);
      msgInput.value = '';
      loadMessages();
    }
  });

  // Auto refresh messages every second
  setInterval(loadMessages, 1000);
  loadMessages();
</script>

</body>
</html>
