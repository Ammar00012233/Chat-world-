<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>دردشة العالم 🌍</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { 
      font-family: 'Arial', sans-serif; 
      margin:0; padding:0; 
      background: linear-gradient(135deg, #667eea, #764ba2); 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .chat-container { 
      max-width: 500px; 
      width: 95%; 
      background: white; 
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
      display: flex; 
      flex-direction: column; 
      height: 85vh; 
      overflow: hidden; 
    }
    header {
      background: #4CAF50;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
    }
    #messages { 
      flex: 1; 
      overflow-y: auto; 
      padding: 15px; 
      display: flex; 
      flex-direction: column; 
      gap: 8px;
      background: #f8f9fa;
    }
    .msg { 
      padding: 10px 14px; 
      border-radius: 18px; 
      max-width: 80%; 
      word-wrap: break-word; 
      position: relative;
      font-size: 15px;
    }
    .msg.user { 
      background: #DCF8C6; 
      align-self: flex-end; 
      border-bottom-right-radius: 4px;
    }
    .msg.other { 
      background: #E5E5EA; 
      align-self: flex-start; 
      border-bottom-left-radius: 4px;
    }
    .msg small {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }
    .input-container { 
      display: flex; 
      padding: 12px; 
      background: white; 
      border-top: 1px solid #ddd;
      gap: 8px;
    }
    #msgInput { 
      flex: 1; 
      padding: 12px 18px; 
      border-radius: 30px; 
      border: 1px solid #ddd; 
      font-size: 15px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 0 22px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #45a049; }
  </style>
</head>
<body>

<div class="chat-container">
  <header>دردشة العالم 🌍 (مجهولة تمامًا)</header>
  <div id="messages"></div>
  <div class="input-container">
    <input id="msgInput" placeholder="اكتب رسالتك هنا..." maxlength="300" />
    <button id="sendBtn">إرسال</button>
  </div>
</div>

<script>
  // ====================== إعداد Supabase ======================
  const supabase = supabase.createClient(
    "https://xrycbvmjskyagnqdrvrt.supabase.co",
    "sb_publishable_V-cqr_rpr8N5nE-MDUrXZQ_PrAhveCY"
  );

  const msgInput = document.getElementById('msgInput');
  const messagesDiv = document.getElementById('messages');
  const sendBtn = document.getElementById('sendBtn');

  // ====================== userId ثابت ======================
  let userId = localStorage.getItem('chatUserId');
  if (!userId) {
    userId = Math.floor(Math.random() * 1000000);
    localStorage.setItem('chatUserId', userId);
  }

  // ====================== تنظيف الرسائل (منع XSS) ======================
  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // ====================== تحميل الرسائل ======================
  async function loadMessages() {
    try {
      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .order('created_at', { ascending: true })
        .limit(50);

      if (error) throw error;

      messagesDiv.innerHTML = data.map(m => {
        const isMe = m.user_id == userId;
        const cls = isMe ? 'user' : 'other';
        const sender = isMe ? 'أنت' : `مستخدم ${m.user_id}`;
        const time = new Date(m.created_at).toLocaleTimeString('ar-EG', {
          hour: 'numeric',
          minute: '2-digit'
        });

        return `
          <div class="msg ${cls}">
            <small>${sender} • ${time}</small>
            ${escapeHtml(m.content)}
          </div>
        `;
      }).join('');

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    } catch (err) {
      console.error('خطأ في تحميل الرسائل:', err);
    }
  }

  // ====================== إرسال رسالة ======================
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    try {
      await supabase
        .from('messages')
        .insert([{ content: text, user_id: userId }]);

      msgInput.value = '';
      // loadMessages();  // Realtime سيقوم بالتحديث تلقائيًا
    } catch (err) {
      console.error('خطأ في الإرسال:', err);
      alert('حدث خطأ أثناء الإرسال!');
    }
  }

  // ====================== Realtime (فوري) ======================
  supabase
    .channel('chat-room')
    .on(
      'postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'messages' },
      () => loadMessages()
    )
    .subscribe();

  // ====================== الأحداث ======================
  sendBtn.addEventListener('click', sendMessage);

  msgInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // تحميل أول مرة
  loadMessages();
</script>

</body>
</html>
